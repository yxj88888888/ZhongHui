services:
  - type: web
    name: zhonghui-gold-display
    runtime: node
    plan: free
    repo: https://github.com/yxj88888888/ZhongHui
    branch: main
    rootDir: 中汇黄金
    buildCommand: npm ci --omit=dev
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
